basePath: /
definitions:
  handler.ShortenRequest:
    properties:
      custom_code:
        type: string
      expires_in_days:
        type: integer
      url:
        type: string
    required:
    - url
    type: object
  handler.errorResponse:
    properties:
      error:
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: A URL shortening service built with Go, Gin, PostgreSQL and Redis.
  title: URL Shortener API
  version: "1.0"
paths:
  /{code}:
    get:
      description: Redirects to the original URL for the given short code
      parameters:
      - description: Short code
        in: path
        name: code
        required: true
        type: string
      responses:
        "301":
          description: Moved Permanently
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handler.errorResponse'
      summary: Redirect to original URL
  /api/stats/{code}:
    get:
      description: Returns click statistics for the given short code
      parameters:
      - description: Short code
        in: path
        name: code
        required: true
        type: string
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handler.errorResponse'
      summary: Get URL stats
  /shorten:
    post:
      consumes:
      - application/json
      description: Generate a short code for the given URL
      parameters:
      - description: Request body
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.ShortenRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.errorResponse'
      summary: Shorten a URL
swagger: "2.0"
